name: Publish to npm

# Publishes the package whenever you create a GitHub Release.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # enables npm provenance (trust signal)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # No build step needed (pure ESM + assets). Type-check as a safety gate.
      - run: npm install
      - run: npm run typecheck

      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
